<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Wir bauen aus deinem Shopify-Onlineshop eine echte App für den App Store."
    />
    <title>App aus Onlineshop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&family=Syne:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Block 1: Intro — content first, scroll motion second -->
    <section class="block block-intro" id="intro" data-scroll-stage>
      <div class="block-intro__sticky">
        <div class="stage-inner">
          <p class="stage-brand">
            <span class="stage-brand__mark" aria-hidden="true"></span>
            App aus Onlineshop
          </p>

          <h1 class="stage-headline">
            <span class="line">Aus deinem Shopify-Shop</span>
            <span class="line">eine App Store App.</span>
          </h1>

          <p class="stage-sub">
            Wir verwandeln deinen Shopify-Onlineshop in eine native App —
            bereit für den App Store. Schneller. Näher. Immer bei deinen Kunden.
          </p>

          <div class="stage-visual" aria-hidden="true">
            <div class="morph">
              <div class="morph__shop" data-parallax="shop">
                <div class="morph__shop-bar">
                  <span></span><span></span><span></span>
                </div>
                <div class="morph__shop-grid">
                  <i></i><i></i><i></i><i></i>
                </div>
                <div class="morph__shop-tag">Shopify</div>
              </div>
              <div class="morph__arrow" data-parallax="arrow">
                <svg viewBox="0 0 48 24" fill="none" aria-hidden="true">
                  <path
                    d="M2 12h40M34 4l10 8-10 8"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </div>
              <div class="morph__phone" data-parallax="phone">
                <div class="morph__phone-notch"></div>
                <div class="morph__phone-screen">
                  <div class="morph__app-icon"></div>
                  <div class="morph__app-lines">
                    <span></span><span></span><span></span>
                  </div>
                </div>
                <div class="morph__phone-tag">App Store</div>
              </div>
            </div>
          </div>

          <p class="stage-hint" data-stage="hint">
            Weiter scrollen
            <span class="stage-hint__chevron"></span>
          </p>
        </div>

        <div class="stage-progress" aria-hidden="true">
          <div class="stage-progress__bar" data-stage="progress"></div>
        </div>
      </div>
    </section>

    <section class="block block-next-spacer" aria-hidden="true"></section>

    <script src="main.js" defer></script>
  </body>
</html>
