<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Wir bauen aus deinem Onlineshop eine echte App für den App Store."
    />
    <title>App aus Onlineshop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&family=Syne:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Block 1: Intro — sticky scroll stage -->
    <section class="block block-intro" id="intro" data-scroll-stage>
      <div class="block-intro__track" aria-hidden="true"></div>
      <div class="block-intro__sticky">
        <div class="stage-bg" data-stage="bg"></div>
        <div class="stage-noise" aria-hidden="true"></div>

        <div class="stage-inner">
          <p class="stage-brand" data-stage="brand">
            <span class="stage-brand__mark"></span>
            App aus Onlineshop
          </p>

          <h1 class="stage-headline" data-stage="headline">
            <span class="line"><span class="word">Aus</span> <span class="word">deinem</span> <span class="word">Shop</span></span>
            <span class="line line--accent"
              ><span class="word">eine</span> <span class="word">App</span> <span class="word">Store</span>
              <span class="word">App.</span></span
            >
          </h1>

          <p class="stage-sub" data-stage="sub">
            Wir verwandeln deinen Onlineshop in eine native App —
            bereit für den App Store. Schneller. Näher. Immer bei deinen Kunden.
          </p>

          <div class="stage-visual" data-stage="visual" aria-hidden="true">
            <div class="morph">
              <div class="morph__shop">
                <div class="morph__shop-bar">
                  <span></span><span></span><span></span>
                </div>
                <div class="morph__shop-grid">
                  <i></i><i></i><i></i><i></i>
                </div>
                <div class="morph__shop-tag">dein shop</div>
              </div>
              <div class="morph__arrow">
                <svg viewBox="0 0 48 24" fill="none" aria-hidden="true">
                  <path
                    d="M2 12h40M34 4l10 8-10 8"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </div>
              <div class="morph__phone">
                <div class="morph__phone-notch"></div>
                <div class="morph__phone-screen">
                  <div class="morph__app-icon"></div>
                  <div class="morph__app-lines">
                    <span></span><span></span><span></span>
                  </div>
                </div>
                <div class="morph__phone-tag">deine app</div>
              </div>
            </div>
          </div>

          <p class="stage-hint" data-stage="hint">
            Weiter scrollen
            <span class="stage-hint__chevron"></span>
          </p>
        </div>

        <div class="stage-progress" aria-hidden="true">
          <div class="stage-progress__bar" data-stage="progress"></div>
        </div>
      </div>
    </section>

    <!-- Platzhalter für nächste Blocks -->
    <section class="block block-next-spacer" aria-hidden="true"></section>

    <script src="main.js" defer></script>
  </body>
</html>
